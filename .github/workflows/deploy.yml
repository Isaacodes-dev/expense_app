# =============================================================================
# Deploy to VPS
#
# Triggers on push to main. SSHs into the server, pulls code, and rebuilds.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SERVER_HOST     - Your VPS IP or domain (e.g., 123.45.67.89)
#   SERVER_USER     - SSH username (e.g., deploy or root)
#   SSH_PRIVATE_KEY - Private key content (the full key, not the path)
#   SERVER_PORT     - SSH port (optional, defaults to 22)
# =============================================================================

name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /var/www/finance-app

            # Pull latest code
            git pull origin main

            # Rebuild and restart containers (no downtime for DB)
            docker compose -f docker-compose.yml up -d --build

            # Clean up old Docker images to save disk space
            docker image prune -f
